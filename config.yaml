filter:
  include_keywords:
    high_priority:    # +3点
      - データ分析
      - ダッシュボード
      - BIツール
      - データ可視化
      - DX推進
    medium_priority:  # +2点
      - 統計調査
      - 集計
      - アンケート
      - 効果検証
      - データ基盤
    low_priority:     # +1点
      - 調査業務
      - 報告書作成
      - 業務委託
      - コンサルティング

  exclude_keywords:
    - 工事
    - 建設
    - 設計監理
    - 測量
    - 清掃
    - 給食
    - 医療機器
    - 道路
    - 橋梁
    - 上下水道
    - 警備
    - 印刷

  notify_threshold: 2

notification:
  slack_webhook_url: ""  # Slack Incoming Webhook URL をここに設定

scraper:
  request_interval: 3    # 同一ドメインへのリクエスト間隔（秒）
  timeout: 30            # リクエストタイムアウト（秒）
  max_retries: 3         # リトライ回数
  user_agent: "MunicipalBidScraper/1.0"

  # 官公需ポータルでの検索対象都道府県 (コード: 都道府県名)
  # 自治体HPスクレイピングの対象とは別。kkjは中央ポータルなので追加コスト軽い。
  # 四国 + 中国地方を対象 (Phase 2 拡張)
  kkj_prefectures:
    "31": "鳥取県"
    "32": "島根県"
    "33": "岡山県"
    "34": "広島県"
    "35": "山口県"
    "36": "徳島県"
    "37": "香川県"
    "38": "愛媛県"
    "39": "高知県"

llm:
  enabled: false                       # true にすると LLM 判定が有効化（要 ANTHROPIC_API_KEY）
  model: "claude-haiku-4-5"            # 判定に使うモデル（Haikuで十分。alias使用、date suffix不要）
  use_tools: true                      # true: agentic ループ (詳細fetch + 過去案件検索)、false: 1回のみ
  max_judgments_per_run: 10            # 1回の実行でLLM判定する案件数の上限（コスト制御）
  max_tool_iterations: 4               # use_tools=true 時、ツール使用ループの最大回数
  max_tokens: 1024

  enable_web_search: false             # true で Anthropic web_search server tool を追加 ($10/1000検索)
  web_search_max_uses: 2               # 1回の判定でweb_searchが呼べる最大回数
